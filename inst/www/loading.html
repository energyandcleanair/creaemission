<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emission Portal - Loading</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: white;
            color: #35416C;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        .loading-container {
            max-width: 400px;
            padding: 2rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 400;
            color: #35416C;
        }

        .subtitle {
            font-size: 1rem;
            margin-bottom: 2rem;
            color: #35416C;
            opacity: 0.8;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top: 3px solid #35416C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 0.9rem;
            color: #35416C;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <img src="/crea_logo.svg" alt="CREA Logo" class="logo">
        <h1>Emission Portal</h1>

        <div class="spinner"></div>

        <div class="loading-text">Loading data sources and preparing the dashboard</div>
    </div>

    <script>
        let retryCount = 0;
        const maxRetries = 60; // 60 retries = ~2 minutes (for longer cold starts)
        let isReady = false;

        function updateStatus(message) {
            document.querySelector('.loading-text').textContent = message;
        }

        function retryConnection() {
            if (isReady) return; // Stop if already ready

            retryCount++;

            fetch('/ready')
                .then(response => {
                    if (response.ok) {
                        // App is ready!
                        isReady = true;
                        updateStatus('App is ready! Redirecting...');

                        // Add a small delay to show the success message
                        setTimeout(() => {
                            // Force a full page reload to ensure we get the latest app
                            window.location.reload(true);
                        }, 1000);
                    } else {
                        throw new Error('Not ready yet');
                    }
                })
                .catch(error => {
                    if (retryCount >= maxRetries) {
                        updateStatus('Connection timeout. Please refresh the page manually.');
                    } else {
                        updateStatus(`Starting application...`);
                        setTimeout(retryConnection, 2000); // Retry every 2 seconds
                    }
                });
        }

        // Start checking immediately
        retryConnection();
    </script>
</body>
</html>

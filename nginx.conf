events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log;

  upstream shiny {
    server 127.0.0.1:3838;
  }

  upstream titiler {
    server 127.0.0.1:8001;
  }

  server {
    listen 8080;
    server_name _;

    # Serve static COGs from /app/data at /data/
    location /data/ {
      alias /app/data/;
      autoindex on;
      add_header Cache-Control "public, max-age=3600";
    }

    # Proxy TiTiler under /cog/
    location /cog/ {
      proxy_pass http://titiler;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_read_timeout 300;

      add_header Access-Control-Allow-Origin *;
      add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
      add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";

      if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
      }
    }

    # Map specific TiTiler endpoints that live at root
    location = /cog/tileMatrixSets {
      proxy_pass http://titiler/tileMatrixSets;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /cog/health {
      proxy_pass http://titiler/health;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve static assets (logo, etc.)
    location /crea_logo.svg {
      root /app/inst/www;
      try_files /crea_logo.svg =404;
    }

    # Shiny app at root with loading page fallback
    location / {
      access_log /var/log/nginx/main_access.log;
      error_log /var/log/nginx/main_error.log debug;
      proxy_pass http://shiny;
      proxy_intercept_errors on;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 86400;
      
      # Show loading page when Shiny is not ready (502/504 errors)
      error_page 502 504 = /loading.html;
    }
    
    # Loading page handler
    location @loading {
      root /app/inst/www;
      try_files /loading.html =404;
      add_header Content-Type text/html;
    }
    
    # Loading page location
    location = /loading.html {
      access_log /var/log/nginx/loading_page.log;
      error_log /var/log/nginx/loading_page_error.log debug;
      alias /app/inst/www/loading.html;
      add_header Content-Type text/html;
      add_header X-Debug-Path "/app/inst/www/loading.html";
    }
    
    # Test loading page (temporary)
    location = /test-loading {
      root /app/inst/www;
      try_files /loading.html =404;
      add_header Content-Type text/html;
    }

    # Readiness endpoint — only returns 200 when Shiny answers upstream
    location = /ready {
      proxy_pass http://shiny/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 5s;
    }
  }
}

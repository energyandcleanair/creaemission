<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emission Portal - Loading</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #35416C 0%, #8cc9d0 100%);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        .logo {
            width: 200px;
            height: 200px;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        
        .loading-container {
            max-width: 500px;
            padding: 2rem;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 300;
        }
        
        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.8;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 2rem;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        
        .progress-fill {
            height: 100%;
            background: #CCE7EB;
            border-radius: 2px;
            animation: progress 3s ease-in-out infinite;
        }
        
        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
        
        .status {
            font-size: 0.9rem;
            opacity: 0.7;
        }
        
        .retry-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 1rem;
            transition: background 0.2s;
        }
        
        .retry-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .error-message {
            display: none;
            color: #ff6b6b;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <img src="/crea_logo.svg" alt="CREA Logo" class="logo">
        <h1>Emission Portal</h1>
        <p class="subtitle">Loading application...</p>
        
        <div class="spinner"></div>
        
        <div class="loading-text">Initializing data sources and preparing the dashboard</div>
        
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        
        <div class="status">This may take a few moments on first load</div>
        
        <button class="retry-btn" onclick="retryConnection()">Retry Connection</button>
        
        <div class="error-message" id="errorMessage">
            Connection failed. Please try again.
        </div>
    </div>

    <script>
        let retryCount = 0;
        const maxRetries = 60; // 60 retries = ~2 minutes (for longer cold starts)
        let isReady = false;
        
        function updateStatus(message) {
            document.querySelector('.loading-text').textContent = message;
        }
        
        function retryConnection() {
            if (isReady) return; // Stop if already ready
            
            retryCount++;
            updateStatus(`Checking if app is ready... (${retryCount}/${maxRetries})`);
            
            fetch('/ready')
                .then(response => {
                    if (response.ok) {
                        // App is ready!
                        isReady = true;
                        updateStatus('App is ready! Redirecting...');
                        
                        // Add a small delay to show the success message
                        setTimeout(() => {
                            // Force a full page reload to ensure we get the latest app
                            window.location.reload(true);
                        }, 1000);
                    } else {
                        throw new Error('Not ready yet');
                    }
                })
                .catch(error => {
                    if (retryCount >= maxRetries) {
                        document.querySelector('.error-message').style.display = 'block';
                        updateStatus('Connection timeout. Please refresh the page manually.');
                    } else {
                        // Show progress based on retry count
                        if (retryCount < 10) {
                            updateStatus(`Initializing... (${retryCount}/${maxRetries})`);
                        } else if (retryCount < 30) {
                            updateStatus(`Loading data sources... (${retryCount}/${maxRetries})`);
                        } else {
                            updateStatus(`Almost ready... (${retryCount}/${maxRetries})`);
                        }
                        
                        setTimeout(retryConnection, 2000); // Retry every 2 seconds
                    }
                });
        }
        
        // Start checking immediately
        retryConnection();
        
        // Also add a manual refresh button that appears after some time
        setTimeout(() => {
            if (!isReady) {
                const retryBtn = document.querySelector('.retry-btn');
                retryBtn.style.display = 'block';
                retryBtn.textContent = 'Refresh Page';
                retryBtn.onclick = () => window.location.reload(true);
            }
        }, 30000); // Show after 30 seconds
    </script>
</body>
</html>
